on:
  pull_request:
    branches: [ "dev" ]
    types: [ closed ]

permissions:
  contents: read
  packages: write   # GITHUB_TOKEN 으로 GHCR push

env:
  IMAGE: ghcr.io/fc-de/dokdok-server

jobs:
  # 1) 빌드는 빈약한 EC2 가 아니라 GitHub 러너(7GB RAM)에서 수행하고
  #    완성된 이미지를 GHCR 에 push 한다. EC2 는 더 이상 빌드하지 않는다.
  build-and-push:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:dev-${{ github.sha }}
          # 의존성 레이어 캐시를 GitHub Actions 캐시에 저장 → build.gradle 안 바뀌면 재다운로드 없음
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) EC2 는 SSH 로 들어가 새 이미지를 pull 해서 띄우기만 한다 (--build 없음).
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,DB_USERNAME,DB_PASSWORD,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_API_KEY,KAKAO_API_BASE_URL,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_EXTERNAL_ENDPOINT,MINIO_BUCKET,MINIO_SERVER_URL
          script: |
            set -e
            cd /opt/dokdok/dev/be
            git fetch --all
            git reset --hard origin/dev

            cat > .env << EOF
            SPRING_PROFILE=dev
            APP_PORT=8080
            DB_PORT=5432
            MINIO_INTERNAL_ENDPOINT=http://dokdok-minio:9000

            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}

            KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            KAKAO_API_KEY=${KAKAO_API_KEY}
            KAKAO_API_BASE_URL=${KAKAO_API_BASE_URL}

            MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT}
            MINIO_BUCKET=${MINIO_BUCKET}
            MINIO_SERVER_URL=${MINIO_SERVER_URL}
            EOF

            # 러너가 GHCR 에 올린 최신 이미지를 받아 교체 (EC2 빌드 없음)
            docker compose --profile app pull app
            docker compose --profile app up -d app
            docker image prune -f
            docker compose ps
        env:
          POSTGRES_DB: ${{ secrets.DEV_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.DEV_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DEV_POSTGRES_PASSWORD }}
          DB_USERNAME: ${{ secrets.DEV_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DEV_DB_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_API_BASE_URL: ${{ secrets.KAKAO_API_BASE_URL }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_EXTERNAL_ENDPOINT: ${{ secrets.DEV_MINIO_EXTERNAL_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.DEV_MINIO_BUCKET }}
          MINIO_SERVER_URL: ${{ secrets.DEV_MINIO_SERVER_URL }}
