on:
  pull_request:
    branches: [ "main" ]
    types: [ closed ]

permissions:
  contents: read
  packages: write   # GITHUB_TOKEN 으로 GHCR push

env:
  IMAGE: ghcr.io/fc-de/dokdok-server

jobs:
  # 1) 러너에서 이미지 빌드 → GHCR push (EC2 는 빌드하지 않음)
  build-and-push:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:prod
            ${{ env.IMAGE }}:prod-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 2) EC2 는 새 이미지를 pull 해서 띄우기만 한다 (--build 없음)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,DB_USERNAME,DB_PASSWORD,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_API_KEY,KAKAO_API_BASE_URL,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_EXTERNAL_ENDPOINT,MINIO_BUCKET,MINIO_SERVER_URL
          script: |
            set -e
            cd /opt/dokdok/prod/be
            git fetch --all
            git reset --hard origin/main

            cat > .env << EOF
            SPRING_PROFILE=prod
            APP_PORT=8081
            DB_PORT=5433
            MINIO_INTERNAL_ENDPOINT=http://dokdok-minio:9000

            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}

            KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            KAKAO_API_KEY=${KAKAO_API_KEY}
            KAKAO_API_BASE_URL=${KAKAO_API_BASE_URL}

            MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT}
            MINIO_BUCKET=${MINIO_BUCKET}
            MINIO_SERVER_URL=${MINIO_SERVER_URL}
            EOF

            docker compose --profile app pull app
            docker compose --profile app up -d app
            docker image prune -f
            docker compose ps
        env:
          POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_API_BASE_URL: ${{ secrets.KAKAO_API_BASE_URL }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_EXTERNAL_ENDPOINT: ${{ secrets.PROD_MINIO_EXTERNAL_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.PROD_MINIO_BUCKET }}
          MINIO_SERVER_URL: ${{ secrets.PROD_MINIO_SERVER_URL }}
