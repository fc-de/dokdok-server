on:
  pull_request:
    branches: [ "main" ]
    types: [ closed ]

jobs:
  deploy:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SSH to EC2 and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,DB_USERNAME,DB_PASSWORD,KAKAO_CLIENT_ID,KAKAO_CLIENT_SECRET,KAKAO_API_KEY,KAKAO_API_BASE_URL,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,MINIO_EXTERNAL_ENDPOINT,MINIO_BUCKET,MINIO_SERVER_URL
          script: |
            set -e
            cd /opt/dokdok/prod/be
            git fetch --all
            git reset --hard origin/main

            cat > .env << EOF
            SPRING_PROFILE=prod
            APP_PORT=8081
            DB_PORT=5433
            MINIO_INTERNAL_ENDPOINT=http://dokdok-minio:9000

            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}

            KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
            KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
            KAKAO_API_KEY=${KAKAO_API_KEY}
            KAKAO_API_BASE_URL=${KAKAO_API_BASE_URL}

            MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
            MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
            MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT}
            MINIO_BUCKET=${MINIO_BUCKET}
            MINIO_SERVER_URL=${MINIO_SERVER_URL}
            EOF

            docker compose --profile app up -d --build app
            docker compose ps
        env:
          POSTGRES_DB: ${{ secrets.PROD_POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.PROD_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.PROD_POSTGRES_PASSWORD }}
          DB_USERNAME: ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          KAKAO_API_BASE_URL: ${{ secrets.KAKAO_API_BASE_URL }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_EXTERNAL_ENDPOINT: ${{ secrets.PROD_MINIO_EXTERNAL_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.PROD_MINIO_BUCKET }}
          MINIO_SERVER_URL: ${{ secrets.PROD_MINIO_SERVER_URL }}
