services:
  app:
    profiles: ["app"]
    # 러너(GitHub Actions)가 GHCR 에 올린 이미지를 받아 띄운다. EC2 빌드 없음.
    # 태그는 프로필별로 분기: dev → :dev, prod → :prod (CD 워크플로가 동일 태그로 push)
    image: ghcr.io/fc-de/dokdok-server:${SPRING_PROFILE:-dev}
    container_name: dokdok-${SPRING_PROFILE:-dev}-app
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: "-Xmx256m"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://dokdok-${SPRING_PROFILE:-dev}-postgres:5432/${POSTGRES_DB:-dokdok}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_API_KEY: ${KAKAO_API_KEY}
      KAKAO_API_BASE_URL: ${KAKAO_API_BASE_URL}
      MINIO_INTERNAL_ENDPOINT: ${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-dokdok-storage}
    ports:
      - '${APP_PORT:-8080}:8080'
    restart: unless-stopped
    depends_on:
      - postgres
    mem_limit: 512m
    volumes:
      - /opt/dokdok/${SPRING_PROFILE:-dev}/logs:/opt/dokdok/${SPRING_PROFILE:-dev}/logs
    networks:
      - dokdok-shared

  postgres:
    profiles: ["app", "local"]
    image: 'postgres:16'
    container_name: dokdok-${SPRING_PROFILE:-dev}-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dokdok}
      POSTGRES_USER: ${POSTGRES_USER:-dokdok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dokdok-shared

  minio:
    profiles: ["shared"]
    image: minio/minio:latest
    container_name: dokdok-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-https://storage.dokdok.site}
      TZ: Asia/Seoul
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    mem_limit: 256m
    volumes:
      - minio_data:/data
    networks:
      - dokdok-shared

volumes:
  postgres_data:
  minio_data:

networks:
  dokdok-shared:
    external: true
