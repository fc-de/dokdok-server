spring:
  # Database Configuration
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5432/dokdok}
    username: ${TEST_DB_USERNAME:dokdok}
    password: ${TEST_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # OAuth2 Configuration (테스트용 더미 설정)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-client-id
            client-secret: test-client-secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop  # CI 테스트 전용으로 매 실행마다 스키마 초기화
    show-sql: false
    open-in-view: false  # OSIV 경고 제거
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
        javax:
          persistence:
            schema-generation:
              create-source: metadata

kakao:
  api:
    key: ${KAKAO_API_KEY:dummy}
    base-url: ${KAKAO_API_BASE_URL:https://dapi.kakao.com}
